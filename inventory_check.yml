name: 在庫チェック（1時間ごと）

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（UTC）= 日本時間 毎時9分
  workflow_dispatch:        # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Google認証情報ファイルを作成
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
        # ↑ GitHubリポジトリの Settings > Secrets に
        #   GOOGLE_CREDENTIALS という名前でJSONの中身を登録してください

      - name: 在庫チェックを実行
        run: python checker.py

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-log-${{ github.run_number }}
          path: inventory.log
          retention-days: 7
